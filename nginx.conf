# PERF-005: compression and cache headers
# Embed routes: do NOT send X-Frame-Options SAMEORIGIN — it blocks third-party iframes and can
# leave the frame on chrome-error://chromewebdata/ with console "Unsafe attempt to load URL…".
# Use CSP frame-ancestors * only for public embed tools.
server {
    listen 80;
    server_name www.thesynlab.com;
    return 301 https://thesynlab.com$request_uri;
}

server {
    listen 80;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml image/webp image/avif;
    server_name thesynlab.com _;
    root /usr/share/nginx/html;
    index index.html;
    etag on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.clerk.accounts.dev https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.convex.cloud https://kindhearted-lark-661.convex.cloud https://www.google-analytics.com https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self' https://thesynlab.com; base-uri 'self'; form-action 'self'" always;

    # Single-hop HTTP → HTTPS redirect
    if ($http_x_forwarded_proto = "http") {
        return 301 https://thesynlab.com$request_uri;
    }

    # Always serve robots.txt with no restrictions.
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }


    # Dead routes: return proper 404 so Google stops flagging soft 404s
    location ~ ^/(guides|glossary|hubs|products/air-purifiers|products/docking-stations|products/ergonomic-chairs|products/mechanical-keyboards|products/monitor-arms|products/monitors|products/robot-vacuums|products/security-cameras|products/smart-doorbells|products/smart-home-hubs|products/smart-lights|products/smart-locks|products/smart-thermostats|products/standing-desks|products/webcams|products/wireless-headphones)/?$ {
        return 404;
    }

        # Legacy/CMS probe paths: avoid repeated 4XX by redirecting to homepage.
    location = /wp-admin/ { return 301 /; }
    location = /wp-login.php { return 301 /; }

    # Legacy hub route migration (/hubs/:slug -> /hub/:slug)
    location ~ ^/hubs/([^/]+)/?$ {
        return 301 /hub/$1;
    }

    # Blog articles — SPA fallback
    location ^~ /blog {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Hub pages — SPA fallback
    location ^~ /hub {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Product detail pages — SPA fallback
    location ^~ /products {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Compare widget embed — allows cross-origin iframes
    location ^~ /tools/compare {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location ^~ /tools/embed {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Hashed assets: long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap and robots: short cache
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # ── AI API Proxy (server-side, avoids browser CORS) ─────────────────
    # The browser calls /api/ai/chat on the same origin; nginx forwards to NVIDIA.
    # The API key is injected from the server env var (not exposed to browser).
    location = /api/ai/chat {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        proxy_pass https://integrate.api.nvidia.com/v1/chat/completions;
        proxy_set_header Host integrate.api.nvidia.com;
        # Inject the NVIDIA API key at the server level (not exposed to browser)
        proxy_set_header Authorization "Bearer $NVIDIA_API_KEY";
        proxy_set_header Content-Type application/json;
        proxy_read_timeout 60s;
        proxy_ssl_server_name on;
        # CORS for the actual response
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # Dynamic routes: generous cache to help repeat visitors
    location ~ ^/(tools|decision-studio|scoring-hub|alternatives|about|contact|privacy|terms|disclosure|guides|glossary) {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # 404.html: return proper 404 for server-recognized missing paths
    # SPA handles route-level 404 via React Router; these nginx-level 404s
    # are for static files that don't exist (images, js, css, etc.)
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA: all other routes
    location / {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "public, max-age=60" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
