# PERF-005: compression and cache headers
# Embed routes: do NOT send X-Frame-Options SAMEORIGIN — it blocks third-party iframes and can
# leave the frame on chrome-error://chromewebdata/ with console "Unsafe attempt to load URL…".
# Use CSP frame-ancestors * only for public embed tools.
server {
    listen 80;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Public embed tools — allow cross-origin iframes (compare widget, embed routes)
    location ^~ /tools/compare {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location ^~ /tools/embed {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Hashed assets: long cache (Vite uses content hash in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap and robots: short cache
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA: all other routes — same-origin framing only
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
