# PERF-005: compression and cache headers
# Embed routes: do NOT send X-Frame-Options SAMEORIGIN — it blocks third-party iframes and can
# leave the frame on chrome-error://chromewebdata/ with console "Unsafe attempt to load URL…".
# Use CSP frame-ancestors * only for public embed tools.
server {
    listen 80;
    server_name www.thesynlab.com;
    return 301 https://thesynlab.com$request_uri;
}

server {
    listen 80;
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    server_name thesynlab.com _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-hop HTTP → HTTPS redirect (avoids the trailing-slash intermediate step
    # caused by nginx normalisation before the Traefik/Coolify HTTPS redirect fires)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://thesynlab.com$request_uri;
    }

    # Always serve robots.txt with no restrictions.
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # Legacy/CMS probe paths: avoid repeated 4XX by redirecting to homepage.
    location = /wp-admin/ { return 301 /; }
    location = /wp-login.php { return 301 /; }

    # Legacy hub route migration (/hubs/:slug -> /hub/:slug)
    location ~ ^/hubs/([^/]+)/?$ {
        return 301 /hub/$1;
    }

    # Public embed tools — allow cross-origin iframes (compare widget, embed routes)
    location ^~ /tools/compare {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location ^~ /tools/embed {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Hashed assets: long cache (Vite uses content hash in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap and robots: short cache
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Custom 404 document for direct missing static assets/files.
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA: all other routes — same-origin framing only
    location / {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
